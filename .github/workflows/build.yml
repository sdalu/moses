name: Build validation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Least privilege: the job only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes / PR updates).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Install packaged dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install libmosquitto-dev libtool libtool-bin libltdl-dev m4

    # Pinned commit recorded in the superproject, used as the cache key.
    - name: Resolve libmbus revision
      id: libmbus
      run: echo "rev=$(git rev-parse HEAD:3rd/libmbus)" >> "$GITHUB_OUTPUT"

    # Cache the libmbus install keyed on the pinned submodule commit, so
    # it is only rebuilt when the submodule is bumped.
    - name: Cache libmbus
      id: cache-libmbus
      uses: actions/cache@v4
      with:
        path: /opt/libmbus
        key: libmbus-${{ runner.os }}-${{ steps.libmbus.outputs.rev }}

    # Build the pinned submodule rather than re-cloning, so CI links the
    # exact libmbus version the repository tracks.
    - name: Build libmbus from submodule
      if: steps.cache-libmbus.outputs.cache-hit != 'true'
      working-directory: 3rd/libmbus
      run: |
        ./build.sh
        ./configure --prefix=/opt/libmbus
        make -j"$(nproc)"
        sudo make install

    - name: Configure
      run: cmake -B build -DWITH_LOG=1 -DWITH_PUT=1 -DWITH_WERROR=1 -DWITH_TESTS=ON

    - name: Build
      run: cmake --build build --parallel "$(nproc)"

    - name: Test
      run: ctest --test-dir build --output-on-failure

    # Separate build so a static-analysis finding is distinguishable from a
    # plain build break. -fanalyzer is scoped to first-party sources.
    - name: Static analysis (gcc -fanalyzer)
      run: |
        cmake -B build-analyze -DWITH_LOG=1 -DWITH_PUT=1 -DWITH_WERROR=1 -DWITH_ANALYZER=1
        cmake --build build-analyze --parallel "$(nproc)"

    - name: Upload executables
      uses: actions/upload-artifact@v4
      with:
        name: moses-binaries
        path: bin/
        if-no-files-found: error
